name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.0'
          cache: true
      
      - name: Get dependencies
        run: |
          cd flutter_client
          flutter pub get
      
      - name: Run tests
        run: |
          cd flutter_client
          flutter test
      
      - name: Analyze code
        run: |
          cd flutter_client
          flutter analyze --no-fatal-infos
      
      - name: Build APK
        run: |
          cd flutter_client
          flutter build apk --release \
            --build-name="homesync-staging" \
            --build-number=${{ github.run_number }}
      
      - name: Generate build info
        id: build-info
        run: |
          echo "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "build-number=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "commit-sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: homesync-staging-apk
          path: flutter_client/build/app/outputs/flutter-apk/
          retention-days: 7
          if-no-files-found: error
      
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: staging-${{ github.run_number }}
          name: Staging Build ${{ github.run_number }}
          body: |
            ## 🚀 Staging Build ${{ github.run_number }}
            
            **Date:** ${{ steps.build-info.outputs.build-date }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            
            ### 📥 Download APK
            Download the APK from the artifacts section below.
            
            ### 📱 Install on Android
            1. Enable "Install from unknown sources" in your device
            2. Download the APK
            3. Open the APK file to install
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
