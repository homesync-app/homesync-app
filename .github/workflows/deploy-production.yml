name: Deploy to Google Play (Internal Testing)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.0"

      - name: Get dependencies
        run: |
          cd flutter_client
          flutter pub get

      - name: Decode Keystore
        run: |
          if [ -n "$ENCODED_KEYSTORE" ] && [ "$ENCODED_KEYSTORE" != "null" ]; then
            echo "$ENCODED_KEYSTORE" | base64 --decode > release.keystore
          else
            echo "No keystore provided, building debug APK"
          fi
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create local.properties
        run: |
          if [ -f "release.keystore" ]; then
            echo "storeFile=release.keystore" >> flutter_client/android/local.properties
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> flutter_client/android/local.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> flutter_client/android/local.properties
            echo "keyPassword=${{ secrets.STORE_PASSWORD }}" >> flutter_client/android/local.properties
          else
            echo "No keystore file, building debug APK"
          fi

      - name: Analyze code
        run: |
          cd flutter_client
          flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build AAB (Release)
        run: |
          cd flutter_client
          if [ -f "../release.keystore" ]; then
            flutter build appbundle --release
          else
            flutter build appbundle --debug
          fi

      - name: Upload AAB as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homesync-appbundle
          path: flutter_client/build/app/outputs/bundle/release/app-release.aab

      - name: Create release notes directory
        run: |
          mkdir -p whatsnew/en-US
          echo "Nueva versión con modo offline, notificaciones push y mejoras de UI." > whatsnew/en-US/whatsnew.txt

      - name: Deploy to Google Play (Internal Testing)
        if: env.ENCODED_KEYSTORE != ''
        uses: r0adkll/upload-google-play@v1.1.2
        with:
          serviceAccountJson: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.blas.homesync
          releaseFiles: flutter_client/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsnewDir: whatsnew
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
