name: Build API Android (HomeSync)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Enable manual run from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código (Checkout)
        uses: actions/checkout@v4

      - name: Preparar y Configurar Java Runtime
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Configurar Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Instalar Dependencias del Proyecto
        run: |
          cd flutter_client
          flutter pub get

      - name: Generar Archivo Instalador APK Físico (App de Prueba para Pareja)
        run: |
          cd flutter_client
          flutter build apk --release

      - name: Subir APK como Artefacto Descargable
        uses: actions/upload-artifact@v4
        with:
          name: HomeSync_Android_App
          path: flutter_client/build/app/outputs/flutter-apk/app-release.apk
