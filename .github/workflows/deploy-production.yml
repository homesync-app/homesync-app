name: Deploy to Google Play (Internal Testing)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pre-deploy-smoke:
    name: Pre-Deploy Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: SQL Quality Gate
        run: |
          python3 scripts/sql_quality_gate.py

      - name: CI Guard
        run: |
          python3 scripts/ci_guard.py

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run production smoke checks
        continue-on-error: true
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [ -z "$PROD_DATABASE_URL" ]; then
            echo "⚠️ PROD_DATABASE_URL not set — skipping smoke checks"
            exit 0
          fi
          python3 scripts/prod_ops/run_post_deploy_smoke.py --db-url "$PROD_DATABASE_URL" || \
            echo "⚠️ Smoke checks failed (DB unreachable from CI) — not blocking deploy"

  build-and-deploy:
    name: Build and Deploy
    needs: pre-deploy-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: |
          cd flutter_client
          flutter pub get

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.SUPABASE_URL }}" ] && missing+=("SUPABASE_URL")
          [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ] && missing+=("SUPABASE_ANON_KEY")
          [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ] && missing+=("FIREBASE_PROJECT_ID")
          [ -z "${{ secrets.FIREBASE_API_KEY }}" ] && missing+=("FIREBASE_API_KEY")
          [ -z "${{ secrets.FIREBASE_APP_ID }}" ] && missing+=("FIREBASE_APP_ID")
          [ -z "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" ] && missing+=("FIREBASE_MESSAGING_SENDER_ID")
          [ -z "${{ secrets.FIREBASE_AUTH_DOMAIN }}" ] && missing+=("FIREBASE_AUTH_DOMAIN")
          [ -z "${{ secrets.FIREBASE_STORAGE_BUCKET }}" ] && missing+=("FIREBASE_STORAGE_BUCKET")
          [ -z "${{ secrets.GOOGLE_WEB_CLIENT_ID }}" ] && missing+=("GOOGLE_WEB_CLIENT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "✅ All secrets present"

      - name: Create production env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          cat > flutter_client/.env.production <<EOF
          APP_ENV=production
          AUTH_MODE=firebase_third_party
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          FIREBASE_API_KEY=${FIREBASE_API_KEY}
          FIREBASE_APP_ID=${FIREBASE_APP_ID}
          FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
          FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
          FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
          GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID}
          EOF

      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
            echo "KEYSTORE_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "KEYSTORE_AVAILABLE=false" >> $GITHUB_ENV
            echo "⚠️ No keystore provided — skipping release signing"
          fi

      - name: Create key.properties
        if: env.KEYSTORE_AVAILABLE == 'true'
        run: |
          cat > flutter_client/android/key.properties <<EOF
          storeFile=../../../release.keystore
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.STORE_PASSWORD }}
          EOF

      - name: Analyze code
        run: |
          cd flutter_client
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Set version code
        run: |
          # Offset keeps versionCode above the last manually-bumped value (53).
          # Formula: 100 + run_number guarantees it always exceeds 53 and auto-increments.
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Building with versionCode: $VERSION_CODE"

      - name: Build AAB (Release)
        run: |
          cd flutter_client
          if [ "${{ env.KEYSTORE_AVAILABLE }}" = "true" ]; then
            flutter build appbundle --release \
              --dart-define-from-file=.env.production \
              --dart-define=APP_ENV=production \
              --build-number=${{ env.VERSION_CODE }}
          else
            echo "No keystore → building debug AAB (not deployable to Play)"
            flutter build appbundle --debug \
              --dart-define-from-file=.env.production \
              --dart-define=APP_ENV=production \
              --build-number=${{ env.VERSION_CODE }}
          fi

      - name: Upload AAB as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homesync-appbundle-${{ github.sha }}
          path: flutter_client/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      - name: Create release notes
        if: env.KEYSTORE_AVAILABLE == 'true'
        run: |
          mkdir -p whatsnew/en-US
          mkdir -p whatsnew/es-AR
          echo "Bug fixes, performance improvements and UI enhancements." > whatsnew/en-US/whatsnew.txt
          echo "Correcciones de errores, mejoras de rendimiento y mejoras de interfaz." > whatsnew/es-AR/whatsnew.txt

      - name: Deploy to Google Play (Internal Testing)
        if: env.KEYSTORE_AVAILABLE == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.blas.homesync
          releaseFiles: flutter_client/build/app/outputs/bundle/release/app-release.aab
          track: alpha
          status: draft
          whatsNewDirectory: whatsnew
