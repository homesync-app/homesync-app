name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Analyze & Test (runs on every push and PR)
  # ──────────────────────────────────────────────────────────────────
  analyze_and_test:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: |
          cd flutter_client
          flutter pub get

      - name: Check Formatting
        run: |
          cd flutter_client
          dart format --output=none --set-exit-if-changed .

      - name: Analyze Project
        run: |
          cd flutter_client
          flutter analyze --no-fatal-warnings

      - name: Run Tests
        run: |
          cd flutter_client
          flutter test

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Build Release AAB (only on version tags like v1.2.0)
  # Requires these GitHub Secrets to be configured:
  #   KEYSTORE_BASE64    → base64 of homesync-release.keystore
  #   KEY_ALIAS          → homesync-key
  #   KEY_PASSWORD       → your keystore password
  #   STORE_PASSWORD     → your keystore store password
  # ──────────────────────────────────────────────────────────────────
  build_release:
    name: 🚀 Build Release AAB
    runs-on: ubuntu-latest
    needs: analyze_and_test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: |
          cd flutter_client
          flutter pub get

      - name: Decode Keystore from GitHub Secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > homesync-release.keystore

      - name: Create key.properties
        run: |
          cat > flutter_client/android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../../../../homesync-release.keystore
          EOF

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build Release AAB
        run: |
          cd flutter_client
          flutter build appbundle \
            --release \
            --build-name=${{ steps.get_version.outputs.VERSION }} \
            --obfuscate \
            --split-debug-info=build/debug-symbols

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: homesync-release-${{ github.ref_name }}
          path: flutter_client/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ github.ref_name }}
          path: flutter_client/build/debug-symbols/
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_client/build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          name: "HomeSync ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
