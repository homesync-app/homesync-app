name: Flutter Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SQL Quality Gate
        run: |
          python3 scripts/sql_quality_gate.py

      - name: CI Guard
        run: |
          python3 scripts/ci_guard.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.29.0"
          cache: true

      - name: Get dependencies
        run: |
          cd flutter_client
          flutter pub get

      - name: Verify Flutter installation
        run: |
          cd flutter_client
          flutter doctor -v

      - name: Run tests
        run: |
          cd flutter_client
          flutter test --coverage

      - name: Analyze code
        run: |
          cd flutter_client
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK (validation only - debug)
        run: |
          cd flutter_client
          flutter build apk --debug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
