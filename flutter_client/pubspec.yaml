name: homesync_client
description: HomeSync Flutter Client - Validación del Contrato API
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase client
  supabase_flutter: ^2.12.0

  # HTTP client
  http: ^1.1.0

  # Local storage
  shared_preferences: ^2.2.0

  # UUID generation
  uuid: ^4.0.0

  # Icons (optional, for better UI)
  cupertino_icons: ^1.0.2

  # Charts
  fl_chart: ^0.66.0

  # Internationalization
  intl: ^0.19.0

  # Confetti animation
  confetti: ^0.8.0

  # URL Launcher
  url_launcher: ^6.2.0
  timeago: ^3.7.1
  table_calendar: ^3.1.3
  flutter_riverpod: ^3.2.1
  google_sign_in: ^7.2.0
  app_links: ^6.4.1
  google_fonts: ^8.0.2
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_crashlytics: ^5.0.7
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  integration_test:
    sdk: flutter
  rename: ^3.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
