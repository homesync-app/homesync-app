name: homesync_client
description: HomeSync Flutter Client - App de gestión de tareas, gastos y recompensas para parejas
publish_to: "none"
version: 1.0.0+7

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase client
  supabase_flutter: ^2.12.0

  # HTTP client
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.3.0
  sqflite: ^2.4.0
  path: ^1.9.0
  connectivity_plus: ^6.1.0

  # UUID generation
  uuid: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.8

  # Charts
  fl_chart: ^0.69.0

  # Internationalization
  intl: ^0.20.0

  # Confetti animation
  confetti: ^0.8.0

  # URL Launcher
  url_launcher: ^6.3.0
  timeago: ^3.7.0
  table_calendar: ^3.1.0
  flutter_riverpod: ^2.6.0
  google_sign_in: ^7.0.0
  app_links: ^6.4.0
  google_fonts: ^6.2.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  firebase_crashlytics: ^4.3.10
  video_player: ^2.9.0
  fpdart: ^1.2.0
  logger: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  integration_test:
    sdk: flutter
  rename: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
