name: Flutter Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.16.0'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Verify Flutter installation
        run: flutter doctor -v
      
      - name: Run tests
        run: flutter test --coverage
      
      - name: Check formatting
        run: dart format --set-exit-if-changed .
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
      
      - name: Build APK (Validation)
        run: flutter build apk --release --flavor staging

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/
          continue-on-error: true
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.existsSync('test-results/test-report.json')
              ? JSON.parse(fs.readFileSync('test-results/test-report.json', 'utf8'))
              : { tests: [], passed: 0, failed: 0 };
            
            const comment = `## 🧪 Test Results\n\n` +
              `✅ Passed: ${testResults.passed}\n` +
              `❌ Failed: ${testResults.failed}\n` +
              `📊 Total: ${testResults.tests.length}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              body: comment
            });
