name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub UI

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.16.0'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run tests first
        run: flutter test
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
      
      - name: Build Staging APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_STAGING_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_STAGING_ANON_KEY }}
        run: |
          flutter build apk --release --flavor staging \
            --build-name="homesync-staging" \
            --build-number=${{ github.run_number }}
      
      - name: Generate build info
        id: build-info
        run: |
          echo "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "build-number=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "commit-sha=${{ github.sha }}" >> $GITHUB_OUTPUT
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: homesync-staging-apk
          path: build/app/outputs/flutter-apk/app-staging-release.apk
          retention-days: 7
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: staging-${{ github.run_number }}
          name: Staging Build ${{ github.run_number }}
          body: |
            ## 🚀 Staging Build ${{ github.run_number }}
            
            **Date:** ${{ steps.build-info.outputs.build-date }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            
            ### 📥 Download APK
            Download the APK from the artifacts below or use this link:
            - [homesync-staging.apk](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### 🧪 Manual Testing Checklist
            - [ ] Install APK on device
            - [ ] Test login flow
            - [ ] Test task completion
            - [ ] Test expense creation
            - [ ] Test notifications
            - [ ] Test offline mode (if implemented)
            
            ### 🔗 Environments
            - **Supabase URL:** ${{ secrets.SUPABASE_STAGING_URL }}
            - **Branch:** ${{ github.ref_name }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify Slack (Success)
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ✅ *Staging Deploy Success*
            Build #${{ github.run_number }} deployed successfully!
            
            **Download APK:** [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
      
      - name: Notify Slack (Failure)
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ❌ *Staging Deploy Failed*
            Build #${{ github.run_number }} failed to deploy.
            
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  notify-teams:
    name: Notify Teams
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    
    steps:
      - name: Send Teams notification
        uses: jdcargascal/discord-webhook-action@main
        with:
          webhook-url: ${{ secrets.TEAMS_WEBHOOK }}
          content: |
            🚀 **Staging Deploy #${{ github.run_number }}**
            
            **Status:** ${{ needs.build-and-deploy.result }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            
            Download APK: [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
        continue-on-error: true
