name: Deploy to Google Play (Internal Testing)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pre-deploy-smoke:
    name: Pre-Deploy Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: SQL Quality Gate
        run: |
          python3 scripts/sql_quality_gate.py

      - name: CI Guard
        run: |
          python3 scripts/ci_guard.py

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run production smoke checks
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [ -z "$PROD_DATABASE_URL" ]; then
            echo "PROD_DATABASE_URL secret is required"
            exit 1
          fi
          python3 scripts/prod_ops/run_post_deploy_smoke.py --db-url "$PROD_DATABASE_URL"

  build-and-deploy:
    name: Build and Deploy
    needs: pre-deploy-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: |
          cd flutter_client
          flutter pub get

      - name: Create production env file
        env:
          SUPABASE_URL_SECRET: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY_SECRET: ${{ secrets.SUPABASE_ANON_KEY }}
          FIREBASE_PROJECT_ID_SECRET: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY_SECRET: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID_SECRET: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID_SECRET: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_AUTH_DOMAIN_SECRET: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET_SECRET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          GOOGLE_WEB_CLIENT_ID_SECRET: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          SUPABASE_URL_VALUE="${SUPABASE_URL_SECRET:-https://tfavamqszdkoeabpyxms.supabase.co}"
          SUPABASE_ANON_KEY_VALUE="${SUPABASE_ANON_KEY_SECRET:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmYXZhbXFzemRrb2VhYnB5eG1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjU5MTYsImV4cCI6MjA4NjkwMTkxNn0.AifBdMFJH14E-JisRcdjWPNpjAOuj6z3J4aYYRxBCSI}"
          FIREBASE_PROJECT_ID_VALUE="${FIREBASE_PROJECT_ID_SECRET:-homesync-prod-r7-123}"
          FIREBASE_API_KEY_VALUE="${FIREBASE_API_KEY_SECRET:-AIzaSyAOH6ZSuqIzI1qOUIynDbWGwOQRym_Wb1I}"
          FIREBASE_APP_ID_VALUE="${FIREBASE_APP_ID_SECRET:-1:105041112830:web:da6228c6d202cdf567ffaf}"
          FIREBASE_MESSAGING_SENDER_ID_VALUE="${FIREBASE_MESSAGING_SENDER_ID_SECRET:-105041112830}"
          FIREBASE_AUTH_DOMAIN_VALUE="${FIREBASE_AUTH_DOMAIN_SECRET:-homesync-prod-r7-123.firebaseapp.com}"
          FIREBASE_STORAGE_BUCKET_VALUE="${FIREBASE_STORAGE_BUCKET_SECRET:-homesync-prod-r7-123.firebasestorage.app}"
          GOOGLE_WEB_CLIENT_ID_VALUE="${GOOGLE_WEB_CLIENT_ID_SECRET:-105041112830-75q9ubotcf7i51cu8u9v9l9j1m6sdcga.apps.googleusercontent.com}"

          cat > flutter_client/.env.production <<EOF
          APP_ENV=production
          AUTH_MODE=firebase_third_party
          SUPABASE_URL=${SUPABASE_URL_VALUE}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY_VALUE}
          FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID_VALUE}
          FIREBASE_API_KEY=${FIREBASE_API_KEY_VALUE}
          FIREBASE_APP_ID=${FIREBASE_APP_ID_VALUE}
          FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID_VALUE}
          FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN_VALUE}
          FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET_VALUE}
          GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID_VALUE}
          EOF

      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
            echo "KEYSTORE_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "KEYSTORE_AVAILABLE=false" >> $GITHUB_ENV
            echo "⚠️ No keystore provided — skipping release signing"
          fi

      - name: Create key.properties
        if: env.KEYSTORE_AVAILABLE == 'true'
        run: |
          cat > flutter_client/android/key.properties <<EOF
          storeFile=../../../release.keystore
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.STORE_PASSWORD }}
          EOF

      - name: Analyze code
        run: |
          cd flutter_client
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build AAB (Release)
        run: |
          cd flutter_client
          if [ "${{ env.KEYSTORE_AVAILABLE }}" = "true" ]; then
            flutter build appbundle --release --dart-define-from-file=.env.production --dart-define=APP_ENV=production
          else
            echo "No keystore → building debug AAB (not deployable to Play)"
            flutter build appbundle --debug --dart-define-from-file=.env.production --dart-define=APP_ENV=production
          fi

      - name: Upload AAB as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homesync-appbundle-${{ github.sha }}
          path: flutter_client/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      - name: Create release notes
        if: env.KEYSTORE_AVAILABLE == 'true'
        run: |
          mkdir -p whatsnew/en-US
          mkdir -p whatsnew/es-AR
          echo "Bug fixes, performance improvements and UI enhancements." > whatsnew/en-US/whatsnew.txt
          echo "Correcciones de errores, mejoras de rendimiento y mejoras de interfaz." > whatsnew/es-AR/whatsnew.txt

      - name: Deploy to Google Play (Internal Testing)
        if: env.KEYSTORE_AVAILABLE == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.blas.homesync
          releaseFiles: flutter_client/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          whatsNewDirectory: whatsnew
