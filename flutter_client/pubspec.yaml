name: homesync_client
description: HomeSync Flutter Client - Validación del Contrato API
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase client
  supabase_flutter: ^1.10.0

  # HTTP client
  http: ^1.1.0

  # Local storage
  shared_preferences: ^2.2.0

  # UUID generation
  uuid: ^4.0.0

  # Icons (optional, for better UI)
  cupertino_icons: ^1.0.2

  # Charts
  fl_chart: ^0.62.0

  # Internationalization
  intl: ^0.19.0

  # Confetti animation
  confetti: ^0.7.0

  # URL Launcher
  url_launcher: ^6.2.0
  timeago: ^3.6.0
  table_calendar: ^3.0.0
  flutter_riverpod: ^2.4.0
  google_sign_in: ^6.2.0
  app_links: ^6.0.0
  google_fonts: ^6.1.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  firebase_crashlytics: ^3.4.0
  video_player: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  integration_test:
    sdk: flutter
  rename: ^2.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
